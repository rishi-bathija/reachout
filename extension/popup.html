<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #0a66c2;
    }

    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .status.connected {
      background: #d4edda;
      color: #155724;
    }

    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #004182;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .link {
      display: block;
      text-align: center;
      color: #0a66c2;
      font-size: 12px;
      margin-top: 12px;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>ReachOutFlow</h1>

  <div id="status-container"></div>

  <div id="link-view">
    <div class="form-group">
      <label for="api-url">API URL</label>
      <input
        type="text"
        id="api-url"
        value="http://localhost:3000"
        placeholder="http://localhost:3000"
      />
    </div>

    <button id="open-link-btn">Open Link Flow</button>

    <div class="form-group" style="margin-top: 12px;">
      <label for="token-input">Paste Token (fallback)</label>
      <input
        type="text"
        id="token-input"
        placeholder="Paste token from link page"
      />
    </div>

    <button id="save-token-btn">Save Token</button>

    <a href="http://localhost:3000" target="_blank" class="link">Open Dashboard</a>
  </div>

  <div id="linked-view" style="display: none;">
    <div id="pending-view" style="display: none;">
      <div class="form-group">
        <label for="pending-name">Name</label>
        <input type="text" id="pending-name" placeholder="Full name" />
      </div>
      <div class="form-group">
        <label for="pending-role">Role / Headline</label>
        <input type="text" id="pending-role" placeholder="Role" />
      </div>
      <div class="form-group">
        <label for="pending-company">Company</label>
        <input type="text" id="pending-company" placeholder="Company" />
      </div>
      <div class="form-group">
        <label for="pending-profile">Profile URL</label>
        <input type="text" id="pending-profile" placeholder="LinkedIn URL" />
      </div>
      <div class="form-group">
        <label for="pending-job-title">Job Title (optional)</label>
        <input type="text" id="pending-job-title" placeholder="Job title" />
      </div>
      <div class="form-group">
        <label for="pending-job-url">Job URL (optional)</label>
        <input type="text" id="pending-job-url" placeholder="Job URL" />
      </div>
      <div class="form-group">
        <label for="pending-notes">Notes (optional)</label>
        <input type="text" id="pending-notes" placeholder="Notes" />
      </div>
      <button id="save-connection-btn">Save Connection</button>
      <button id="clear-pending-btn" style="background: #6c757d;">Clear</button>
    </div>

    <div id="no-pending-view" style="display: none;">
      <div class="status disconnected">No pending connection captured yet.</div>
    </div>

    <button id="unlink-btn">Disconnect</button>
    <a href="http://localhost:3000/dashboard" target="_blank" class="link">Open Dashboard</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
